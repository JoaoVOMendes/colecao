<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Coleção</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #171717;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0ee;
    --muted: #888;
    --accent: #e8c84a;
    --accent2: #c9a820;
    --red: #e85d3a;
    --green: #4caf82;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  header {
    padding: 2.5rem 2rem 0;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .header-left h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .header-left h1 span { color: var(--accent); }
  .header-left p { color: var(--muted); font-size: 14px; margin-top: 6px; font-family: 'DM Mono', monospace; }

  .stats {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .stat {
    text-align: right;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .toolbar {
    max-width: 1200px;
    margin: 2rem auto 0;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 99px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }

  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    stroke: var(--muted);
    fill: none;
    pointer-events: none;
  }
  .search {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 99px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 6px 14px 6px 30px;
    width: 180px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--muted); }

  .view-toggle {
    display: flex;
    border: 0.5px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
  }
  .view-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 6px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: all 0.15s;
  }
  .view-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; }
  .view-btn.active { background: var(--surface2); color: var(--text); }
  .view-btn:hover:not(.active) { color: var(--text); }

  .grid-container {
    max-width: 1200px;
    margin: 1.5rem auto 0;
    padding: 0 2rem;
  }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .list { display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    animation: fadeIn 0.3s ease both;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--surface2);
    display: block;
  }
  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-img-placeholder svg { width: 32px; height: 32px; stroke: #333; fill: none; }

  .card-body { padding: 12px 14px 14px; }
  .card-brand {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .card-model { font-size: 15px; font-weight: 500; line-height: 1.2; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }
  .badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .badge-lacrado { background: rgba(76,175,130,0.12); color: var(--green); }
  .badge-aberto { background: rgba(232,197,74,0.12); color: var(--accent); }
  .badge-danificado { background: rgba(232,93,58,0.12); color: var(--red); }
  .card-price { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--muted); }

  /* List view */
  .list-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color 0.15s;
    animation: fadeIn 0.25s ease both;
  }
  .list-card:hover { border-color: var(--border2); }
  .list-thumb {
    width: 64px;
    height: 48px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .list-thumb-placeholder {
    width: 64px;
    height: 48px;
    border-radius: 6px;
    background: var(--surface2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .list-thumb-placeholder svg { width: 20px; height: 20px; stroke: #333; fill: none; }
  .list-info { flex: 1; min-width: 0; }
  .list-brand { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
  .list-model { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 16px;
    max-width: 640px;
    width: 100%;
    overflow: hidden;
    animation: fadeIn 0.2s ease;
  }
  .modal-img { width: 100%; max-height: 420px; object-fit: contain; background: var(--surface2); display: block; }
  .modal-img-placeholder { width: 100%; aspect-ratio: 16/10; background: var(--surface2); display: flex; align-items: center; justify-content: center; }
  .modal-img-placeholder svg { width: 48px; height: 48px; stroke: #333; fill: none; }
  .modal-body { padding: 1.25rem 1.5rem 1.5rem; }
  .modal-brand { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .modal-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 1rem;
  }
  .modal-field label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; }
  .modal-field p { font-size: 14px; color: var(--text); margin-top: 2px; }
  .modal-close {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(0,0,0,0.5);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .modal-wrapper { position: relative; }

  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 14px;
  }

  /* Config banner */
  .config-banner {
    max-width: 1200px;
    margin: 1.5rem auto 0;
    padding: 0 2rem;
  }
  .config-box {
    background: rgba(232,197,74,0.06);
    border: 0.5px solid rgba(232,197,74,0.3);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .config-box svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; flex-shrink: 0; margin-top: 2px; }
  .config-box p { font-size: 13px; color: var(--muted); flex: 1; line-height: 1.5; }
  .config-box code { font-family: 'DM Mono', monospace; font-size: 11px; background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 4px; color: var(--text); }
  .config-box input {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    width: 100%;
    margin-top: 8px;
    outline: none;
  }
  .config-box input:focus { border-color: var(--accent); }
  .btn-load {
    margin-top: 8px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  .btn-load:hover { background: var(--accent2); }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    header { padding: 1.5rem 1rem 0; }
    .toolbar, .grid-container, .config-banner { padding: 0 1rem; }
    .stats { gap: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Minha <span>Coleção</span></h1>
    <p id="last-update">— miniaturas cadastradas</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-lacrado">0</div>
      <div class="stat-label">Lacrados</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-valor">R$0</div>
      <div class="stat-label">Investido</div>
    </div>
  </div>
</header>

<div class="config-banner">
  <div class="config-box">
    <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <div style="flex:1">
      <p>Cole abaixo o ID da sua planilha Google Sheets. Ela precisa estar <strong style="font-weight:500;color:var(--text)">compartilhada publicamente</strong> (qualquer pessoa com o link pode visualizar).<br>
      O ID fica na URL: <code>docs.google.com/spreadsheets/d/<strong style="color:var(--accent)">ID_AQUI</strong>/edit</code></p>
      <input type="text" id="sheet-id-input" placeholder="Cole o ID da planilha aqui…">
      <br>
      <button class="btn-load" onclick="loadFromSheet()">Carregar coleção</button>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="todos" onclick="setFilter('todos', this)">Todos</button>
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search" id="search" type="text" placeholder="Buscar modelo…" oninput="renderCards()">
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grade">
      <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <button class="view-btn" id="btn-list" onclick="setView('list')" title="Lista">
      <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
  </div>
</div>

<div class="grid-container">
  <div id="cards-wrap" class="grid"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-wrapper">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modal-img-wrap"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
</div>

<script>
let allData = [];
let activeFilter = 'todos';
let currentView = 'grid';

const COL = {
  timestamp: 0, marca: 1, montadora: 2, modelo: 3,
  ano_carro: 4, ano_lanc: 5, serie: 6,
  cor: 7, condicao: 8, preco: 9, foto: 10
};

function extractDriveId(raw) {
  if (!raw) return null;
  // https://drive.google.com/open?id=XXX
  let m = raw.match(/[?&]id=([a-zA-Z0-9_-]{20,})/);
  if (m) return m[1];
  // https://drive.google.com/file/d/XXX/view
  m = raw.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
  if (m) return m[1];
  // raw ID string (no slashes, no http)
  if (!raw.includes('/') && !raw.includes('http') && raw.length > 15) return raw.trim();
  return null;
}

function imgUrl(raw) {
  if (!raw) return null;
  const id = extractDriveId(raw);
  if (id) return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w400';
  if (raw.startsWith('http')) return raw;
  return null;
}

function imgLarge(raw) {
  if (!raw) return null;
  const id = extractDriveId(raw);
  if (id) return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w1200';
  if (raw.startsWith('http')) return raw;
  return null;
}

function placeholderSvg() {
  return `<svg viewBox="0 0 24 24" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
}

function badgeClass(c) {
  if (!c) return '';
  const v = c.toLowerCase();
  if (v.includes('lacrado')) return 'badge-lacrado';
  if (v.includes('aberto')) return 'badge-aberto';
  if (v.includes('danificado')) return 'badge-danificado';
  return '';
}

function parsePrice(p) {
  if (!p) return NaN;
  const clean = String(p).replace(/R\$\s*/gi, '').replace(/\s/g, '').replace(/\.(?=\d{3})/g, '').replace(',', '.');
  return parseFloat(clean);
}

function formatPrice(p) {
  if (!p) return '';
  const n = parsePrice(p);
  if (isNaN(n)) return '';
  return 'R$ ' + n.toFixed(2).replace('.', ',');
}

function filteredData() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return allData.filter(r => {
    const matchFilter = activeFilter === 'todos' || (r[COL.marca] || '').toLowerCase() === activeFilter;
    const matchSearch = !q || (r[COL.modelo] || '').toLowerCase().includes(q) || (r[COL.montadora] || '').toLowerCase().includes(q) || (r[COL.marca] || '').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
}

function renderCards() {
  const wrap = document.getElementById('cards-wrap');
  const data = filteredData();
  wrap.className = currentView === 'grid' ? 'grid' : 'list';

  if (!data.length) {
    wrap.innerHTML = '<div class="empty">Nenhuma miniatura encontrada.</div>';
    return;
  }

  wrap.innerHTML = data.map((r, i) => {
    const url = imgUrl(r[COL.foto]);
    const imgTag = url
      ? `<img class="${currentView === 'grid' ? 'card-img' : 'list-thumb'}" src="${url}" alt="${r[COL.modelo]}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="${currentView === 'grid' ? 'card-img-placeholder' : 'list-thumb-placeholder'}" style="${url ? 'display:none' : ''}">${placeholderSvg()}</div>`;

    if (currentView === 'list') {
      return `<div class="list-card" onclick="openModal(${i})" style="animation-delay:${Math.min(i*0.03,0.3)}s">
        ${imgTag}${placeholder}
        <div class="list-info">
          <div class="list-brand">${r[COL.marca] || '—'}</div>
          <div class="list-model">${r[COL.montadora] ? r[COL.montadora] + ' ' : ''}${r[COL.modelo] || '—'}</div>
          <div class="list-sub">${r[COL.ano_carro] ? r[COL.ano_carro] + ' · ' : ''}${r[COL.serie] || ''}</div>
        </div>
        <div class="list-right">
          <span class="badge ${badgeClass(r[COL.condicao])}">${r[COL.condicao] || '—'}</span>
          <span style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)">${formatPrice(r[COL.preco])}</span>
        </div>
      </div>`;
    }

    return `<div class="card" onclick="openModal(${i})" style="animation-delay:${Math.min(i*0.04,0.4)}s">
      ${imgTag}${placeholder}
      <div class="card-body">
        <div class="card-brand">${r[COL.marca] || '—'}</div>
        <div class="card-model">${r[COL.montadora] ? r[COL.montadora] + ' ' : ''}${r[COL.modelo] || '—'}</div>
        <div class="card-sub">${r[COL.ano_carro] ? r[COL.ano_carro] : ''}${r[COL.serie] ? ' · ' + r[COL.serie] : ''}</div>
        <div class="card-footer">
          <span class="badge ${badgeClass(r[COL.condicao])}">${r[COL.condicao] || '—'}</span>
          <span class="card-price">${formatPrice(r[COL.preco])}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // re-map indices to filtered
  wrap.querySelectorAll('[onclick^="openModal"]').forEach((el, i) => {
    const realIdx = allData.indexOf(data[i]);
    el.setAttribute('onclick', `openModal(${realIdx})`);
  });
}

function openModal(idx) {
  const r = allData[idx];
  const url = imgLarge(r[COL.foto]);
  const imgWrap = document.getElementById('modal-img-wrap');
  imgWrap.innerHTML = url
    ? `<img class="modal-img" src="${url}" alt="${r[COL.modelo]}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex"><div class="modal-img-placeholder" style="display:none">${placeholderSvg()}</div>`
    : `<div class="modal-img-placeholder">${placeholderSvg()}</div>`;

  const fields = [
    { label: 'Montadora', val: r[COL.montadora] },
    { label: 'Ano do carro', val: r[COL.ano_carro] },
    { label: 'Ano de lançamento', val: r[COL.ano_lanc] },
    { label: 'Escala', val: '1:64' },
    { label: 'Série', val: r[COL.serie] },
    { label: 'Cor', val: r[COL.cor] },
    { label: 'Condição', val: r[COL.condicao] },
    { label: 'Preço pago', val: formatPrice(r[COL.preco]) },
  ].filter(f => f.val);

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-brand">${r[COL.marca] || ''}</div>
    <div class="modal-title">${r[COL.montadora] ? r[COL.montadora] + ' ' : ''}${r[COL.modelo] || ''}</div>
    <div class="modal-grid">${fields.map(f => `<div class="modal-field"><label>${f.label}</label><p>${f.val}</p></div>`).join('')}</div>`;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay') || e.currentTarget.tagName === 'BUTTON') {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({ target: document.getElementById('modal-overlay') }); });

function setFilter(val, el) {
  activeFilter = val;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  renderCards();
}

function updateStats() {
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-lacrado').textContent = allData.filter(r => (r[COL.condicao] || '').toLowerCase().includes('lacrado')).length;
  const total = allData.reduce((s, r) => {
    const v = parsePrice(r[COL.preco]);
    return s + (isNaN(v) ? 0 : v);
  }, 0);
  document.getElementById('stat-valor').textContent = 'R$' + total.toFixed(0);
  document.getElementById('last-update').textContent = allData.length + ' miniaturas cadastradas';
}

function buildTabs() {
  const marcas = [...new Set(allData.map(r => r[COL.marca]).filter(Boolean))].sort();
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = `<button class="tab active" data-filter="todos" onclick="setFilter('todos', this)">Todos</button>` +
    marcas.map(m => `<button class="tab" data-filter="${m.toLowerCase()}" onclick="setFilter('${m.toLowerCase()}', this)">${m}</button>`).join('');
  activeFilter = 'todos';
}

async function loadFromSheet() {
  const id = document.getElementById('sheet-id-input').value.trim();
  if (!id) { alert('Cole o ID da planilha primeiro.'); return; }

  const btn = document.querySelector('.btn-load');
  btn.textContent = 'Carregando…';
  btn.disabled = true;

  const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=respostas%20ao%20formul%C3%A1rio%201`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Erro ao buscar planilha');
    const text = await res.text();
    const rows = parseCSV(text);
    allData = rows.slice(1).filter(r => r.some(c => c.trim()));
    localStorage.setItem('sheet_id', id);
    buildTabs();
    updateStats();
    renderCards();
    document.querySelector('.config-box p').innerHTML = 'Planilha carregada com sucesso! <strong style="color:var(--green);font-weight:500">✓</strong>';
  } catch (err) {
    alert('Não foi possível carregar. Verifique se a planilha está pública (compartilhar → qualquer pessoa com o link) e se o ID está correto.');
  } finally {
    btn.textContent = 'Carregar coleção';
    btn.disabled = false;
  }
}

function parseCSV(text) {
  return text.split('\n').map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"' && !inQ) { inQ = true; }
      else if (c === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"' && inQ) { inQ = false; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

renderCards();

// Auto-load se já tiver ID salvo
const savedId = localStorage.getItem('sheet_id');
if (savedId) {
  document.getElementById('sheet-id-input').value = savedId;
  loadFromSheet();
}
</script>
